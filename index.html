<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Shooter</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    #score {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 20px;
      z-index: 10;
      font-family: sans-serif;
    }
  </style>
</head>
<body>

<div id="score">Score: 0</div>

<a-scene>
  <a-sky color="#222"></a-sky>
  <a-plane rotation="-90 0 0" width="100" height="100" color="#333"></a-plane>

  <!-- Player -->
  <a-entity id="player" position="0 1.6 0">
    <a-camera wasd-controls-enabled="false"></a-camera>
  </a-entity>

  <!-- Enemies -->
  <a-sphere class="enemy" position="2 1 -5" radius="0.5" color="red"></a-sphere>
  <a-sphere class="enemy" position="-2 1 -6" radius="0.5" color="yellow"></a-sphere>
  <a-sphere class="enemy" position="0 2 -8" radius="0.5" color="blue"></a-sphere>

</a-scene>

<script>
let player = document.getElementById("player");
let score = 0;
let gamepadIndex = null;

// Connect controller
window.addEventListener("gamepadconnected", (e) => {
  gamepadIndex = e.gamepad.index;
});

// Movement + Look
function update() {
  if (gamepadIndex !== null) {
    let gp = navigator.getGamepads()[gamepadIndex];

    if (gp) {
      // Move
      let speed = 0.1;
      player.object3D.position.x += gp.axes[0] * speed;
      player.object3D.position.z += gp.axes[1] * speed;

      // Look
      player.object3D.rotation.y -= gp.axes[2] * 0.05;
      player.object3D.rotation.x -= gp.axes[3] * 0.05;

      // Shoot (R2)
      if (gp.buttons[7].pressed) {
        shoot();
      }
    }
  }

  requestAnimationFrame(update);
}
update();

// Shooting logic
function shoot() {
  let camera = document.querySelector("a-camera");
  let enemies = document.querySelectorAll(".enemy");

  enemies.forEach(enemy => {
    let enemyPos = enemy.object3D.position;
    let camPos = camera.object3D.getWorldPosition(new THREE.Vector3());

    let distance = camPos.distanceTo(enemyPos);

    if (distance < 5) {
      enemy.setAttribute("visible", "false");
      score++;
      document.getElementById("score").innerText = "Score: " + score;
    }
  });
}

// Make enemies move
setInterval(() => {
  let enemies = document.querySelectorAll(".enemy");

  enemies.forEach(enemy => {
    if (enemy.getAttribute("visible") === false) return;

    let x = (Math.random() - 0.5) * 10;
    let z = -5 - Math.random() * 10;

    enemy.setAttribute("position", `${x} 1 ${z}`);
  });
}, 2000);
</script>

</body>
</html>
